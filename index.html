<!DOCTYPE html>

<html>

<head>

<title>PAN AI Trade Bridge</title>


<style>


body{

background:#111;

color:white;

font-family:Arial;

text-align:center;

}



.card{

background:#222;

margin:40px auto;

padding:30px;

width:380px;

border-radius:20px;

}



button{

background:#008cff;

color:white;

padding:12px 25px;

border:0;

border-radius:10px;

}


</style>


</head>


<body>


<h1>PAN AI Trade Bridge</h1>


<div class="card">


<h2>NIFTY 50</h2>


<h1 id="nifty">
Loading
</h1>


<h2>OPTION CHAIN</h2>


<p>
ATM Strike :
<span id="atm"></span>
</p>



<hr>


<h3>CALL (CE)</h3>


<p>
Price:
<span id="ce"></span>
</p>


<p>
OI:
<span id="ceoi"></span>
</p>


<p>
Trend:
<span id="cetrend"></span>
</p>



<hr>


<h3>PUT (PE)</h3>


<p>
Price:
<span id="pe"></span>
</p>


<p>
OI:
<span id="peoi"></span>
</p>


<p>
Trend:
<span id="petrend"></span>
</p>



<hr>


<p>
PCR:
<span id="pcr"></span>
</p>



<h2 id="signal"></h2>



<p>
AI Confidence:
<span id="confidence"></span>
</p>


<p>
Entry:
<span id="entry"></span>
</p>


<p>
Stop Loss:
<span id="sl"></span>
</p>


<p>
Target:
<span id="target"></span>
</p>



<button onclick="loadData()">
Refresh
</button>



</div>



<script>


async function loadData(){


let r =
await fetch("/analyze");

let d =
await r.json();



nifty.innerHTML=d.nifty;


atm.innerHTML=d.atm;


ce.innerHTML=d.ce_price;


pe.innerHTML=d.pe_price;


ceoi.innerHTML=d.ce_oi;


peoi.innerHTML=d.pe_oi;


cetrend.innerHTML=d.ce_trend;


petrend.innerHTML=d.pe_trend;


pcr.innerHTML=d.pcr;


signal.innerHTML=
"AI SIGNAL : "+d.signal;


confidence.innerHTML=d.confidence;


entry.innerHTML=d.entry;


sl.innerHTML=d.stoploss;


target.innerHTML=d.target;



}


loadData();



</script>


</body>


</html>
