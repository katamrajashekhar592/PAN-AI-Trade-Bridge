<!DOCTYPE html>
<html>

<head>

<title>PAN AI Trade Bridge</title>


<style>

body{

font-family:Arial;

background:#111;

color:white;

text-align:center;

}


.card{

background:#222;

margin:50px auto;

padding:30px;

width:350px;

border-radius:15px;

}


</style>


</head>


<body>


<h1>PAN AI Trade Bridge</h1>


<div class="card">


<h2>NIFTY 50</h2>


<h1 id="price">Loading...</h1>


<p id="change"></p>

<p id="percent"></p>


<p id="trend"></p>


<p id="rsi"></p>

<p id="ma20"></p>

<p id="ma50"></p>


<p id="support"></p>

<p id="resistance"></p>


<p id="confidence"></p>


<p id="stoploss"></p>

<p id="target"></p>


<h2 id="action"></h2>


</div>




<script>


fetch("/analyze")


.then(res=>res.json())


.then(data=>{


price.innerHTML=data.price;


change.innerHTML="Change: "+data.change;


percent.innerHTML="Percent: "+data.percent+"%";


trend.innerHTML=data.trend;


rsi.innerHTML="RSI: "+data.rsi;


ma20.innerHTML="MA 20: "+data.moving_average_20;


ma50.innerHTML="MA 50: "+data.moving_average_50;


support.innerHTML="Support: "+data.support;


resistance.innerHTML="Resistance: "+data.resistance;


confidence.innerHTML="AI Confidence: "+data.confidence;


stoploss.innerHTML="Stop Loss: "+data.stoploss;


target.innerHTML="Target: "+data.target;


action.innerHTML=data.action;


})


</script>


</body>

</html>
