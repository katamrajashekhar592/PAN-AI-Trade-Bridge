<!DOCTYPE html>
<html>

<head>

<title>PAN AI Trade Bridge</title>


<style>

body{

font-family:Arial;

background:#111;

color:white;

text-align:center;

}


.card{

background:#222;

margin:40px auto;

padding:30px;

width:360px;

border-radius:20px;

box-shadow:0 0 20px #000;

}


h1{

font-size:32px;

}


.price{

font-size:35px;

font-weight:bold;

}


.green{

color:#00ff99;

}


.red{

color:#ff5555;

}


button{

padding:12px 25px;

border:none;

border-radius:10px;

background:#008cff;

color:white;

font-size:16px;

}

</style>


</head>


<body>


<h1>PAN AI Trade Bridge</h1>


<div class="card">


<h2>NIFTY 50</h2>


<div class="price" id="price">
Loading...
</div>


<p id="change"></p>


<h3 id="trend"></h3>


<p id="market"></p>


<p>RSI : <span id="rsi"></span></p>


<p>MA 20 : <span id="ma20"></span></p>


<p>MA 50 : <span id="ma50"></span></p>


<p>Support : <span id="support"></span></p>


<p>Resistance : <span id="resistance"></span></p>


<p>AI Confidence : <span id="confidence"></span></p>


<p>Stop Loss : <span id="stop"></span></p>


<p>Target : <span id="target"></span></p>


<h2 id="action"></h2>


<button onclick="loadData()">

Refresh

</button>


</div>




<script>


async function loadData(){


let response = await fetch("/analyze");


let data = await response.json();



document.getElementById("price").innerHTML =
data.price;



document.getElementById("change").innerHTML =
"Change: "+data.change+" ("+data.percent+"%)";



document.getElementById("trend").innerHTML =
data.trend;



document.getElementById("market").innerHTML =
data.market;



document.getElementById("rsi").innerHTML =
data.rsi;



document.getElementById("ma20").innerHTML =
data.ma20;



document.getElementById("ma50").innerHTML =
data.ma50;



document.getElementById("support").innerHTML =
data.support;



document.getElementById("resistance").innerHTML =
data.resistance;



document.getElementById("confidence").innerHTML =
data.confidence;



document.getElementById("stop").innerHTML =
data.stoploss;



document.getElementById("target").innerHTML =
data.target;



document.getElementById("action").innerHTML =
data.action;



}



loadData();


setInterval(loadData,30000);


</script>



</body>

</html>
