<!DOCTYPE html>
<html>

<head>

<title>PAN AI Trade Bridge</title>

<meta name="viewport" content="width=device-width, initial-scale=1">


<style>

body{

background:#111;
color:white;
font-family:Arial;
text-align:center;

}


h1{

margin-top:30px;

}


.card{

background:#222;
width:85%;
max-width:500px;
margin:40px auto;
padding:30px;
border-radius:20px;

box-shadow:0 0 20px #000;

}


.price{

font-size:40px;
font-weight:bold;

}


.section{

margin-top:25px;
border-top:1px solid #777;
padding-top:20px;

}


.title{

font-size:22px;
font-weight:bold;

}


.value{

margin:10px;
font-size:18px;

}


.signal{

font-size:28px;
font-weight:bold;
margin-top:20px;

}



button{

background:#008cff;
color:white;
border:none;
padding:15px 35px;
border-radius:10px;
font-size:18px;

}

</style>

</head>



<body>


<h1>PAN AI Trade Bridge</h1>


<div class="card">


<h2>NIFTY 50</h2>


<div class="price" id="price">
Loading...
</div>


<div class="section">


<div class="title">
OPTION CHAIN
</div>


<div class="value">

ATM Strike :
<span id="atm"></span>

</div>


</div>





<div class="section">


<div class="title">
CALL (CE)
</div>


<div class="value">

Price :
<span id="ce_price"></span>

</div>


<div class="value">

OI :
<span id="ce_oi"></span>

</div>


<div class="value">

Trend :
<span id="ce_trend"></span>

</div>


</div>






<div class="section">


<div class="title">
PUT (PE)
</div>



<div class="value">

Price :
<span id="pe_price"></span>

</div>


<div class="value">

OI :
<span id="pe_oi"></span>

</div>



<div class="value">

Trend :
<span id="pe_trend"></span>

</div>



</div>





<div class="section">


<div class="value">

PCR :
<span id="pcr"></span>

</div>


<div class="signal" id="signal">

WAIT

</div>


<div class="value">

AI Confidence :
<span id="confidence"></span>

</div>


<div class="value">

Entry :
<span id="entry"></span>

</div>


<div class="value">

Stop Loss :
<span id="sl"></span>

</div>



<div class="value">

Target :
<span id="target"></span>

</div>



</div>



<br>


<button onclick="loadData()">

Refresh

</button>



</div>






<script>


async function loadData(){


try{


let response = await fetch("/analyze");


let data = await response.json();




document.getElementById("price").innerHTML =
data.price;



document.getElementById("atm").innerHTML =
data.option_chain.ATM;



document.getElementById("ce_price").innerHTML =
data.option_chain.CE.price;



document.getElementById("ce_oi").innerHTML =
data.option_chain.CE.OI;



document.getElementById("ce_trend").innerHTML =
data.option_chain.CE.trend;




document.getElementById("pe_price").innerHTML =
data.option_chain.PE.price;



document.getElementById("pe_oi").innerHTML =
data.option_chain.PE.OI;



document.getElementById("pe_trend").innerHTML =
data.option_chain.PE.trend;




document.getElementById("pcr").innerHTML =
data.option_chain.PCR;



document.getElementById("signal").innerHTML =
"AI SIGNAL : " + data.signal;



document.getElementById("confidence").innerHTML =
data.confidence;



document.getElementById("entry").innerHTML =
data.entry;



document.getElementById("sl").innerHTML =
data.stoploss;



document.getElementById("target").innerHTML =
data.target;



}

catch(error){


console.log(error);


document.getElementById("signal").innerHTML =
"DATA ERROR";


}


}



loadData();



</script>



</body>

</html>
