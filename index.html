<!DOCTYPE html>
<html>
<head>
<title>PAN AI Trade Bridge</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:35px;
}

.card{
    background:#222;
    width:80%;
    max-width:600px;
    margin:40px auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px #000;
}

.price{
    font-size:45px;
    margin:20px;
}

.section{
    border-top:1px solid #777;
    margin-top:25px;
    padding-top:20px;
}

h2{
    margin:10px;
}

button{
    background:#008cff;
    color:white;
    border:0;
    padding:15px 40px;
    border-radius:10px;
    font-size:18px;
    margin-top:25px;
}
</style>

</head>


<body>

<h1>PAN AI Trade Bridge</h1>


<div class="card">


<h2>NIFTY 50</h2>

<div class="price" id="nifty">
Loading
</div>



<div class="section">

<h2>OPTION CHAIN</h2>

<p>
ATM Strike :
<span id="atm">-</span>
</p>


</div>



<div class="section">

<h2>CALL (CE)</h2>

<p>
Price :
<span id="ce_price">-</span>
</p>


<p>
OI :
<span id="ce_oi">-</span>
</p>


<p>
Trend :
<span id="ce_trend">-</span>
</p>


</div>



<div class="section">

<h2>PUT (PE)</h2>


<p>
Price :
<span id="pe_price">-</span>
</p>


<p>
OI :
<span id="pe_oi">-</span>
</p>


<p>
Trend :
<span id="pe_trend">-</span>
</p>


</div>



<div class="section">


<p>
PCR :
<span id="pcr">-</span>
</p>



<h2>
AI SIGNAL :
<span id="signal">
-
</span>
</h2>


<p>
Confidence :
<span id="confidence">
-
</span>
</p>



<p>
Entry :
<span id="entry">
-
</span>
</p>


<p>
Stop Loss :
<span id="sl">
-
</span>
</p>


<p>
Target :
<span id="target">
-
</span>
</p>



<button onclick="loadData()">
Refresh
</button>



</div>



</div>





<script>


async function loadData(){


try{


let response = await fetch("/analyze");


let data = await response.json();



document.getElementById("nifty").innerHTML =
data.price;



let option = data.option_chain;



document.getElementById("atm").innerHTML =
option.ATM;



document.getElementById("ce_price").innerHTML =
option.CE.price;



document.getElementById("ce_oi").innerHTML =
option.CE.OI;



document.getElementById("ce_trend").innerHTML =
option.CE.trend;



document.getElementById("pe_price").innerHTML =
option.PE.price;



document.getElementById("pe_oi").innerHTML =
option.PE.OI;



document.getElementById("pe_trend").innerHTML =
option.PE.trend;



document.getElementById("pcr").innerHTML =
option.PCR;



document.getElementById("signal").innerHTML =
data.signal;



document.getElementById("confidence").innerHTML =
data.confidence;



document.getElementById("entry").innerHTML =
data.entry;



document.getElementById("sl").innerHTML =
data.stoploss;



document.getElementById("target").innerHTML =
data.target;



}

catch(error){

console.log(error);

}



}



loadData();


</script>



</body>
</html>
